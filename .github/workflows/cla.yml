name: CLA 📝

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]
  workflow_call:
    secrets:
      GH_PAT:
        required: true

permissions:
  actions: read
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'pull_request_target'
      || github.event_name == 'workflow_call'
      || (github.event_name == 'issue_comment' && github.event.issue.pull_request)
    steps:
      - name: CLA Assistant
        id: cla-check
        if: >
          github.event_name == 'pull_request_target'
          || github.event_name == 'workflow_call'
          || github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA'
          || github.event.comment.body == 'recheck'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.GH_PAT }}
        with:
          path-to-signatures: "signatures/cla.json"
          path-to-document: "https://github.com/omnidotdev/.github/blob/master/CLA.md"
          branch: "master"
          remote-organization-name: "omnidotdev"
          remote-repository-name: ".github"
          allowlist: "bot*,dependabot[bot],renovate[bot],github-actions[bot]"
          custom-notsigned-prcomment: |
            Thank you for your contribution! Before we can accept it, please sign our [Contributor License Agreement](https://github.com/omnidotdev/.github/blob/master/CLA.md).

            ## How to sign

            Post a comment with the following exact text:

            > I have read the CLA Document and I hereby sign the CLA

            Once signed, push a new commit or comment `recheck` to update the status.
          custom-allsigned-prcomment: "All contributors have signed the CLA."
          lock-pullrequest-aftermerge: "true"
          suggest-recheck: "true"

      # Forward CLA status to the PR head commit. `pull_request_target`
      # runs against the base branch SHA, so the status the CLA action
      # posts never lands on the PR head — causing required-check rules
      # to stay stuck on "expected".
      - name: Forward CLA status to PR head
        if: always() && github.event.pull_request.head.sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.cla-check.outcome }}" = "success" ]; then
            STATE="success"
            DESC="All contributors have signed the CLA."
          else
            STATE="failure"
            DESC="CLA signature required."
          fi

          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state="$STATE" \
            -f context="cla / cla" \
            -f description="$DESC"
